<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #0c0c0f; color: #fff; overflow: hidden; height: 100vh; }

.app { display: flex; height: 100vh; }

.channel-card { background: rgba(255,255,255,.04); border-radius: 8px; overflow: hidden; cursor: pointer; transition: .25s; border: 1px solid transparent; position: relative; aspect-ratio: 2/3; }

.channel-list { display: flex; flex-direction: column; gap: 4px; }

.row-view { padding-bottom: 24px; }

.row-card { flex: 0 0 160px; aspect-ratio: 2/3; border-radius: 8px; overflow: hidden; cursor: pointer; position: relative; scroll-snap-align: start; transition: .25s; border: 1px solid transparent; }

.row-card .card-overlay { position: absolute; inset: 0; background: linear-gradient(transparent 55%, rgba(0,0,0,.85)); display: flex; flex-direction: column; justify-content: flex-end; padding: 14px; opacity: 0; transition: .25s; }

.channel-row { display: flex; align-items: center; gap: 14px; padding: 9px 14px; background: rgba(255,255,255,.03); border-radius: 10px; cursor: pointer; transition: .15s; position: relative; }

.player-overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; cursor: default; overflow: hidden; }

.player-video-wrap video { width: 100%; height: 100%; object-fit: contain; }
.player-epg { position: absolute; bottom: 0; left: 0; right: 0; padding: 24px 20px 12px; background: linear-gradient(transparent, rgba(0,0,0,.8)); z-index: 2; transition: opacity .4s; opacity: 0; pointer-events: none; }

.main-body { flex: 1; display: flex; overflow: hidden; }

.bg-card { background: rgba(255,255,255,.04); }

.epg-channel-filter button { padding: 4px 14px; background: rgba(255,255,255,.04); border: none; border-radius: 6px; color: #888; font-size: 11px; cursor: pointer; transition: .15s; }
.epg-channel-filter button.active { background: rgba(233,69,96,.15); color: var(--accent); font-weight: 600; }
.epg-channel-filter button:hover:not(.active) { color: #aaa; background: rgba(255,255,255,.06); }
.tv-card-lg .channel-card { min-height: 200px; }
.tv-card-lg .row-card { flex: 0 0 200px; min-height: 280px; }
@media (max-width: 768px) {
  .hamburger { display: block; }
  .sidebar { position: fixed; left: -280px; top: 0; bottom: 0; width: 260px; z-index: 100; transition: left .25s; background: #121216; }
  .sidebar.open { left: 0; }
  .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 99; display: none; }
  .sidebar-overlay.show { display: block; }
  .channel-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
  .topbar { padding: 10px 14px; gap: 10px; }
  .content { padding: 14px; }
  .row-card { flex: 0 0 130px; }
  .inline-player { width: 100%; position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; max-height: 50vh; border-left: none; border-top: 1px solid rgba(255,255,255,.08); }
  .ip-video-wrap video { max-height: 200px; }
}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="logo">
      <div class="logo-icon">▶</div>
      <h1>Eddy<span>Player</span></h1>
      <p>Entre com seus dados de acesso</p>
    </div>
    <div class="flex flex-col gap-10">
      <div class="login-tabs">
        <button class="login-tab active" data-mode="xtream" onclick="setLoginMode('xtream')">Servidor Xtream</button>
        <button class="login-tab" data-mode="m3u" onclick="setLoginMode('m3u')">Lista M3U</button>
      </div>
      <select class="login-input" id="serverList" onchange="loadServer()">
        <option value="">-- Servidores salvos --</option>
      </select>
      <div id="xtreamFields">
        <input class="login-input" id="serverName" placeholder="Nome (ex: Minha TV)">
        <input class="login-input" id="serverUrl" placeholder="URL do servidor" oninput="checkSaveVisibility()">
        <input class="login-input" id="userName" placeholder="Usuário" oninput="checkSaveVisibility()">
        <input class="login-input" id="userPass" type="password" placeholder="Senha" oninput="checkSaveVisibility()">
        <label class="checkbox-row"><input type="checkbox" id="xtreamCorsProxy"> Usar proxy CORS (se não conectar)</label>
      </div>
      <div id="m3uFields" class="hidden">
        <input class="login-input" id="m3uName" placeholder="Nome (ex: Minha Lista)">
        <input class="login-input" id="m3uUrl" placeholder="URL da playlist M3U" oninput="checkSaveVisibility()">
        <input class="login-input" id="m3uEpgUrl" placeholder="URL do EPG XMLTV (opcional)">
        <label class="checkbox-row"><input type="checkbox" id="m3uCorsProxy"> Usar proxy CORS (se a playlist não carregar)</label>
      </div>
      <div class="flex gap-8">
        <button class="login-btn flex-1" id="connectBtn" onclick="handleConnect()">CONECTAR</button>
        <button class="btn-admin-login" onclick="showAdminLogin()" title="Admin">🔧</button>
      </div>
      <div id="saveBar" style="display:none;margin-top:4px"><button class="login-save-btn" onclick="saveServer();this.parentElement.style.display='none'">💾 Salvar servidor</button></div>
      <div class="flex gap-8 flex-wrap" id="quickServers"></div>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="app hidden" id="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><div class="badge">E</div><h2>EddyPlayer</h2></div>
    <div class="sidebar-user"><div class="name" id="sideName"></div><div class="expiry" id="sideExpiry"></div></div>
    <nav class="sidebar-nav" id="sideNav"></nav>
    <div class="sidebar-footer"><button onclick="showSettings()" title="Configurações" class="flex-1 icon-btn">⚙</button><button onclick="logout()" class="flex-1">Sair</button></div>
  </aside>
  <div class="main">
    <div id="networkBanner" class="network-banner hidden">Sem conexão com a internet</div>
    <div class="topbar">
      <button class="hamburger" id="hamburgerBtn" tabindex="0" onclick="toggleSidebar()">☰</button>
      <div class="search-wrap"><span class="icon">🔍</span><input id="searchInput" placeholder="Buscar..." onkeydown="if(event.key==='Enter')searchNow()"></div>
      <div class="view-toggle">
        <button class="active view-btn" tabindex="0" onclick="setView('grid')" id="vGrid">Grid</button>
        <button class="view-btn" tabindex="0" onclick="setView('list')" id="vList">Lista</button>
        <button class="view-btn" tabindex="0" onclick="setView('row')" id="vRow">Fileiras</button>
        <button class="view-btn" tabindex="0" onclick="toggleSplit()" id="vSplit" title="Split view">⊞</button>
        <button class="view-btn" tabindex="0" onclick="showEPGGrid()" id="vEpg" title="Guia de programação">📋 EPG</button>
      </div>
    </div>
    <div class="main-body" id="mainBody">
      <div class="content" id="contentArea"><div id="inner"></div></div>
      <div class="inline-player hidden" id="inlinePlayer">
        <div class="ip-top"><h2 id="ipTitle"></h2><div class="ip-btns"><button class="ip-btn" id="ipMaxBtn" onclick="maximizeInlinePlayer()" title="Maximizar">⛶</button><button class="ip-btn" onclick="closeInlinePlayer()">✕</button></div></div>
        <div class="ip-video-wrap"><video id="ipVideo" controls tabindex="0"></video></div>
        <div class="ip-epg" id="ipEpg"><div class="now" id="ipNow"></div><div class="next" id="ipNext"></div></div>
      </div>
    </div>
  </div>
</div>

<div class="player-overlay hidden" id="playerOverlay">
  <div class="player-top">
    <button type="button" id="closePlayerBtn">←</button>
    <h2 id="playerTitle"></h2>
  </div>
  <div class="player-video-wrap" id="playerVideoWrap">
    <video id="playerVideo" controls></video>
  </div>
  <div class="player-epg" id="playerEpg">
    <div class="ch-name" id="pepgName"></div>
    <div class="now" id="pepgNow"></div>
    <div class="next"><span>A seguir:</span> <span id="pepgNext"></span></div>
  </div>
</div>

<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
// ── State ──
let srv = '', user = '', pass = '', info = null;
let cats = {}, streams = {}, series = [];
let type = 'live', view = localStorage.getItem('zyx_view') || 'grid', catId = null, hls = null, showingFavs = false;
let wakeLock = null;
let loginMode = 'xtream', m3uEpgUrl = '';
const CACHE = {}, EPG_CACHE = {};
const MODS = [
  { k: 'live', i: '📡', l: 'Ao Vivo' },
  { k: 'movie', i: '🎬', l: 'Filmes' },
  { k: 'series', i: '📺', l: 'Séries' },
];
const APP_VERSION = '1.0.0';
const $ = s => document.getElementById(s);
const normalizeStr = s => (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
function searchNow() { render(); }
function toggleSidebar() { $('sidebar').classList.toggle('open'); $('sidebarOverlay').classList.toggle('show'); }
function closeSidebar() { if (window.innerWidth <= 768) { $('sidebar').classList.remove('open'); $('sidebarOverlay').classList.remove('show'); } }
function escapeHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function showToast(msg) { const e=document.createElement('div'); e.className='toast'; e.textContent=msg; document.body.appendChild(e); requestAnimationFrame(()=>e.style.opacity='1'); setTimeout(()=>{e.style.opacity='0';setTimeout(()=>e.remove(),300)},2500); }

const PROXIES = [
  url => `https://corsproxy.org/${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => url,
];
let proxyIndex = 0;
function useProxy(url) {
  if (!$('xtreamCorsProxy')?.checked) return url;
  return PROXIES[proxyIndex](url);
}
function tryNextProxy() {
  if (proxyIndex < PROXIES.length - 1) { proxyIndex++; return true; }
  return false;
}
function resetProxy() { proxyIndex = 0; }
function useNativePlayer() {
  const n = localStorage.getItem('zyx_native_player');
  if (n === '1') return true; if (n === '0') return false;
  if ((window.Capacitor || window.top?.Capacitor)?.isNative) return true;
  return /Android\s*TV|Web0S|SmartTV|Tizen|OLED|LG\s*TV|BRAVIA|Hisense/i.test(navigator.userAgent);
}
const _Cap = () => window.Capacitor || window.top?.Capacitor;
async function api(path, q = '') {
  const url = `${srv}/player_api.php?username=${user}&password=${pass}${q ? '&'+q : ''}${path ? '&action='+path : ''}`;
  const Cap = _Cap();
  if (Cap?.isNative && Cap.Plugins?.CapacitorHttp) {
    try {
      const res = await Promise.race([
        Cap.Plugins.CapacitorHttp.get({ url, connectTimeout: 15000 }),
        new Promise((_, rej) => setTimeout(() => rej(new Error('Timeout')), 20000))
      ]);
      if (res.status >= 400) throw new Error('HTTP ' + res.status);
      return res.data;
    } catch(e) { /* fall through to proxy fetch */ }
  }
  for (let i = 0; i < PROXIES.length; i++) {
    const proxyUrl = $('xtreamCorsProxy')?.checked ? PROXIES[i](url) : url;
    try { return await fetch(proxyUrl).then(r => r.json()); }
    catch(e) { if (i === PROXIES.length - 1) throw e; }
  }
}

// ── Built-in servers (edit directly here, survive cache clear) ──
const BUILTIN_SERVERS = [
  // { name: 'Meu Servidor', url: 'http://exemplo.com', user: 'usuario', pass: 'senha' },
];

// ── Favorites ──
function getFavs() {
  try { return JSON.parse(localStorage.getItem('zyx_favs') || '[]'); } catch { return []; }
}
function saveFavs(f) { localStorage.setItem('zyx_favs', JSON.stringify(f)); }
function isFav(type, id) { return getFavs().some(f => f.t === type && f.id === id); }
function toggleFav(type, id) {
  let f = getFavs();
  const i = f.findIndex(x => x.t === type && x.id === id);
  if (i >= 0) { f.splice(i, 1); showToast('⭐ Removido dos favoritos'); } else { f.push({ t: type, id }); showToast('⭐ Adicionado aos favoritos'); }
  saveFavs(f);
  if (showingFavs) render(); else updateFavButtons();
}

// ── Screen Wake Lock ──
async function requestWakeLock() {
  try {
    if (wakeLock) wakeLock.release();
    if (navigator.wakeLock) wakeLock = await navigator.wakeLock.request('screen');
  } catch(e) { console.warn('WakeLock failed:', e); }
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}

// ── Network ──
window.addEventListener('online', () => { $('networkBanner').classList.add('hidden'); });
window.addEventListener('offline', () => { $('networkBanner').classList.remove('hidden'); });

// ── Server management ──
function getServers() {
  try { return JSON.parse(localStorage.getItem('zyx_servers') || '[]'); } catch { return []; }
}
function saveServers(list) { localStorage.setItem('zyx_servers', JSON.stringify(list)); }

function renderServerList() {
  const saved = getServers();
  const sel = $('serverList');
  const q = $('quickServers');
  sel.innerHTML = saved.length ? '<option value="">-- Servidores salvos --</option>' : '<option value="">-- Servidores --</option>';
  q.innerHTML = '';
  // Built-in first
  BUILTIN_SERVERS.forEach((sv, i) => {
    const idx = -(i + 1);
    const label = (sv.type === 'm3u' ? '📋 ' : '🔒 ') + (sv.name || sv.url);
    sel.innerHTML += `<option value="${idx}">${label}</option>`;
    if (sv.type === 'm3u' || (sv.user && sv.pass)) {
      q.innerHTML += `<button class="login-btn btn-secondary quick-btn" onclick="quickConnect(${idx})">${sv.name || sv.url.replace(/https?:\/\//,'')}</button>`;
    }
  });
  const sorted = [...saved].sort((a, b) => (b.fav ? 1 : 0) - (a.fav ? 1 : 0));
  sorted.forEach((sv, i) => {
    const origIdx = saved.indexOf(sv);
    const star = sv.fav ? '⭐ ' : '';
    const label = star + (sv.type === 'm3u' ? '📋 ' : '📡 ') + (sv.name || sv.url);
    sel.innerHTML += `<option value="${origIdx}">${label}</option>`;
    if (sv.type === 'm3u' || (sv.user && sv.pass)) {
      q.innerHTML += `<div class="quick-row"><button class="star-btn" onclick="event.stopPropagation();toggleFavServer(${origIdx})">${sv.fav?'⭐':'☆'}</button><button class="login-btn btn-secondary quick-btn flex-1" onclick="quickConnect(${origIdx})">${sv.name || sv.url.replace(/https?:\/\//,'')}</button></div>`;
    }
  });
  const last = localStorage.getItem('zyx_last');
  if (last) {
    const idx = saved.findIndex(s => s.url === last);
    if (idx >= 0) sel.value = idx;
  }
}

function loadServer() {
  const sel = $('serverList');
  const idx = parseInt(sel.value);
  if (isNaN(idx)) return;
  // Negative index = built-in server
  if (idx < 0) {
    const sv = BUILTIN_SERVERS[-(idx + 1)];
    if (!sv) return;
    $('serverName').value = sv.name || '';
    $('serverUrl').value = sv.url;
    $('userName').value = sv.user || '';
    $('userPass').value = sv.pass || '';
    checkSaveVisibility();
    return;
  }
  const list = getServers();
  const sv = list[idx];
  if (!sv) return;
  if (sv.type === 'm3u') {
    setLoginMode('m3u');
    $('m3uName').value = sv.name || '';
    $('m3uUrl').value = sv.url || '';
    $('m3uEpgUrl').value = sv.epgUrl || '';
  } else {
    setLoginMode('xtream');
    $('serverName').value = sv.name || '';
    $('serverUrl').value = sv.url;
    $('userName').value = sv.user || '';
    $('userPass').value = sv.pass || '';
    checkSaveVisibility();
  }
}

function saveServer() {
  if (loginMode === 'm3u') {
    const name = $('m3uName').value.trim();
    const url = $('m3uUrl').value.trim();
    const epgUrl = $('m3uEpgUrl').value.trim();
    if (!url) return;
    let list = getServers();
    const finalName = name || url.replace(/https?:\/\//,'').split('/')[0];
    const idx = list.findIndex(s => s.url === url && s.type === 'm3u');
    if (idx >= 0) list[idx] = { name: finalName, url, epgUrl, type: 'm3u' };
    else list.push({ name: finalName, url, epgUrl, type: 'm3u' });
    saveServers(list);
    renderServerList();
    $('serverList').value = list.findIndex(s => s.url === url && s.type === 'm3u');
  } else {
    const name = $('serverName').value.trim();
    const url = $('serverUrl').value.trim();
    const u = $('userName').value.trim();
    const p = $('userPass').value.trim();
    if (!url) return;
    let list = getServers();
    const finalName = name || url.replace(/https?:\/\//,'').split('/')[0];
    const idx = list.findIndex(s => s.url === url && s.user === u);
    if (idx >= 0) list[idx] = { name: finalName, url, user: u, pass: p };
    else list.push({ name: finalName, url, user: u, pass: p });
    saveServers(list);
    renderServerList();
    $('serverList').value = list.findIndex(s => s.url === url && s.user === u);
  }
}

function delServer() {
  const sel = $('serverList');
  const idx = parseInt(sel.value);
  if (isNaN(idx) || idx < 0) return;
  if (!confirm('Remover servidor?')) return;
  let list = getServers();
  list.splice(idx, 1);
  saveServers(list);
  renderServerList();
  sel.value = '';
}

function quickConnect(idx) {
  let sv;
  if (idx < 0) {
    sv = BUILTIN_SERVERS[-(idx + 1)];
    if (!sv) return;
  } else {
    const list = getServers();
    sv = list[idx];
    if (!sv) return;
  }
  if (sv.type === 'm3u') {
    setLoginMode('m3u');
    $('m3uName').value = sv.name || '';
    $('m3uUrl').value = sv.url || '';
    $('m3uEpgUrl').value = sv.epgUrl || '';
    connectM3U();
  } else {
    setLoginMode('xtream');
    $('serverUrl').value = sv.url;
    $('userName').value = sv.user;
    $('userPass').value = sv.pass;
    $('serverName').value = sv.name || '';
    connect();
  }
}

renderServerList();
checkSaveVisibility();
// Auto-check CORS proxy if served over HTTPS (GitHub Pages)
if (location.protocol === 'https:') {
  const cb = $('xtreamCorsProxy');
  if (cb) cb.checked = true;
}

function checkSaveVisibility() {
  const bar = $('saveBar');
  if (!bar) return;
  if (loginMode === 'm3u') {
    bar.style.display = $('m3uUrl').value.trim() ? '' : 'none';
  } else {
    bar.style.display = ($('serverUrl').value.trim() && $('userName').value.trim() && $('userPass').value.trim()) ? '' : 'none';
  }
}
function setLoginMode(mode) {
  loginMode = mode;
  document.querySelectorAll('.login-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  $('xtreamFields').classList.toggle('hidden', mode !== 'xtream');
  $('m3uFields').classList.toggle('hidden', mode !== 'm3u');
  checkSaveVisibility();
}

function handleConnect() {
  if (loginMode === 'm3u') connectM3U();
  else connect();
}

function showAdminLogin() {
  const existing = document.getElementById('adminModal');
  if (existing) existing.remove();
  const bd = document.createElement('div');
  bd.className = 'modal-backdrop';
  bd.id = 'adminModal';
  bd.onclick = e => { if (e.target === bd) bd.remove(); };
  bd.innerHTML = `<div class="modal-box" style="max-width:320px;text-align:center">
    <h2 class="mb-16">🔧 Administrador</h2>
    <input type="password" id="adminPassInput" class="login-input" placeholder="Senha" style="text-align:center;font-size:20px;letter-spacing:4px" onkeydown="if(event.key==='Enter')checkAdminPass()">
    <div class="login-error" id="adminPassError"></div>
    <div class="flex gap-8 mt-16">
      <button class="login-btn flex-1" onclick="checkAdminPass()">OK</button>
      <button class="login-btn btn-secondary flex-1" onclick="document.getElementById('adminModal')?.remove()">Cancelar</button>
    </div>
  </div>`;
  document.body.appendChild(bd);
  setTimeout(() => $('adminPassInput')?.focus(), 100);
}
function checkAdminPass() {
  const input = $('adminPassInput'), err = $('adminPassError');
  if (!input || !err) return;
  if (input.value === getAdminPass()) {
    $('adminModal')?.remove();
    showAdminPanel();
  } else {
    err.textContent = 'Senha incorreta'; input.value = ''; input.focus();
  }
}
function showAdminPanel() {
  const rm = document.getElementById('adminPanelModal');
  if (rm) rm.remove();
  function renderServers() {
    const bd = document.getElementById('adminPanelModal');
    if (!bd) return;
    const list = getServers();
    bd.innerHTML = `<div class="modal-box" style="max-width:420px">
      <button class="close-modal" onclick="this.closest('.modal-backdrop').remove()">✕</button>
      <h2 class="mb-16">🔧 Gerenciar Servidores</h2>
      ${list.length ? list.map((sv,i) => `<div style="display:flex;align-items:center;gap:6px;padding:8px;background:rgba(255,255,255,.03);border-radius:8px;margin-bottom:6px${sv.fav?';border:1px solid rgba(233,69,96,.3)':''}"><button class="login-btn btn-secondary" style="padding:2px 6px;font-size:14px;line-height:1" onclick="adminToggleFav(${i})" title="Favorito">${sv.fav?'⭐':'☆'}</button><div style="flex:1;min-width:0"><div style="font-size:13px">${sv.name||sv.url}</div><div style="font-size:11px;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${sv.url}${sv.type==='m3u'?' (M3U)':''}</div></div><button class="login-btn btn-secondary" style="padding:2px 8px;font-size:12px" onclick="if(confirm('Remover?')){let l=getServers();l.splice(${i},1);saveServers(l);window.renderServers()}">✕</button></div>`).join('') : '<div class="text-muted mb-12">Nenhum servidor cadastrado</div>'}
      <div style="display:flex;gap:8px;margin-top:8px"><input class="login-input" id="admName" placeholder="Nome" style="flex:1"><input class="login-input" id="admUrl" placeholder="URL do servidor" style="flex:2"></div>
      <div style="display:flex;gap:8px;margin-top:8px"><input class="login-input" id="admUser" placeholder="Usuário (opcional)" style="flex:1"><input class="login-input" id="admPass" placeholder="Senha (opcional)" style="flex:1"></div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="login-btn flex-1" onclick="adminAddXtream()">+ Xtream</button>
        <button class="login-btn btn-secondary flex-1" onclick="adminAddM3U()">+ M3U</button>
      </div>
      <div class="mt-16 bg-card rounded-12 p-16" style="background:rgba(255,255,255,.03)">
        <div class="text-muted mb-8" style="font-size:11px">🔑 Senha de administrador (deixe vazio p/ voltar ao padrão)</div>
        <div class="flex gap-8">
          <input type="text" id="adminNewPass" class="login-input" placeholder="Nova senha admin" style="font-size:13px" value="${localStorage.getItem('zyx_admin_pass')||''}">
          <button class="login-btn btn-secondary" style="font-size:12px;white-space:nowrap" onclick="const v=$('adminNewPass').value.trim();if(v&&v.length<4){showToast('Mínimo 4 caracteres')}else{setAdminPass(v||'');showToast(v?'Senha definida':'Senha restaurada p/ padrão');window.renderServers()}">Salvar</button>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="login-btn btn-secondary flex-1" onclick="this.closest('.modal-backdrop').remove()">Fechar</button>
        <button class="login-btn btn-secondary" style="color:#ff4757" onclick="if(confirm('Resetar TODOS os dados?')){localStorage.clear();sessionStorage.clear();location.reload()}">Resetar</button>
      </div>
    </div>`;
  }
  window.renderServers = renderServers;
  const bd = document.createElement('div');
  bd.className = 'modal-backdrop';
  bd.id = 'adminPanelModal';
  bd.onclick = e => { if (e.target === bd) bd.remove(); };
  document.body.appendChild(bd);
  renderServers();
}

function adminAddXtream() {
  const n = $('admName').value.trim(), u = $('admUrl').value.trim(), z = $('admUser').value.trim(), p = $('admPass').value.trim();
  if (!u) return;
  let l = getServers();
  l.push({ name: n || u.replace(/https?:\/\//,'').split('/')[0], url: u, user: z, pass: p, fav: false });
  saveServers(l);

function formatExpDate(d) {
  if (!d || d === '0000-00-00' || d === '0') return 'Nunca';
  const n = parseInt(d);
  if (!isNaN(n) && n > 100000) {
    const dt = new Date(n * 1000);
    if (dt.getFullYear() > 2000 && dt.getFullYear() < 2100) return dt.toLocaleDateString('pt-BR');
  }
  if (/^\d{4}-\d{2}-\d{2}/.test(d)) {
    const dt = new Date(d);
    if (!isNaN(dt)) return dt.toLocaleDateString('pt-BR');
  }
  return d;
}

function parseM3U(text) {
  const lines = text.split('\n');
  const live = [], movie = [];
  let current = null;
  for (let raw of lines) {
    const line = raw.trim();
    if (!line || line === '#EXTM3U') continue;
    if (line.startsWith('#EXTINF:')) {
      if (current) (current.stream_type === 'movie' ? movie : live).push(current);
      const idx = line.indexOf(',');
      if (idx < 0) continue;
      const before = line.substring(9, idx);
      const name = line.substring(idx + 1).trim();
      current = {
        name, stream_id: 'm3u_' + Math.random().toString(36).slice(2,10),
        stream_icon: '', epg_channel_id: '', category_name: 'General',
        container_extension: '', stream_type: 'live', rating: 0, stream_url: '',
      };
      const ga = (key) => { const r = new RegExp(key+'="([^"]*)"'); const m = before.match(r); return m ? m[1] : ''; };
      const tvgId = ga('tvg-id'), tvgLogo = ga('tvg-logo'), tvgName = ga('tvg-name'), grp = ga('group-title'), typ = ga('type');
      if (tvgId) current.epg_channel_id = tvgId;
      if (tvgLogo) current.stream_icon = tvgLogo;
      if (tvgName) current.name = tvgName;
      if (grp) current.category_name = grp;
      if (typ === 'movie') current.stream_type = 'movie';
    } else if (line.startsWith('http://') || line.startsWith('https://')) {
      if (current) {
        current.stream_url = line;
        const em = line.match(/\.(\w+)(?:\?|$)/);
        if (em) current.container_extension = em[1];
      }
    }
  }
  if (current) (current.stream_type === 'movie' ? movie : live).push(current);
  return { live, movie };
}

// ── EPG ──
let epgMap = {};
let epgLoading = false;
let epgDone = false;
let epgCallbacks = [];

function onEPGReady(fn) {
  if (epgDone) fn();
  else epgCallbacks.push(fn);
}

async function loadEPG() {
  if (epgDone || epgLoading) return;
  epgLoading = true;
  try {
    const url = m3uEpgUrl || `${srv}/xmltv.php?username=${user}&password=${pass}`;
    if (!url) { epgLoading = false; return; }
    const res = await fetch(url, { signal: AbortSignal.timeout(30000) });
    const xml = await res.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(xml, 'text/xml');
    const programmes = doc.querySelectorAll('programme');
    programmes.forEach(p => {
      const ch = p.getAttribute('channel');
      if (!ch) return;
      if (!epgMap[ch]) epgMap[ch] = [];
      const start = p.getAttribute('start') || '';
      const stop = p.getAttribute('stop') || '';
      const title = p.querySelector('title')?.textContent || '';
      epgMap[ch].push({
        title,
        start,
        stop,
        start_timestamp: parseXmltvTime(start),
        stop_timestamp: parseXmltvTime(stop),
      });
    });
    epgDone = true;
    epgCallbacks.forEach(fn => fn());
    epgCallbacks = [];
  } catch(e) { console.warn('EPG load failed:', e); }
  epgLoading = false;
}

function parseXmltvTime(t) {
  if (!t) return 0;
  const m = t.match(/^(\d{4})(\d{2})(\d{2})(\d{2})(\d{2})(\d{2})(?:\s*([+-])(\d{2})(\d{2}))?/);
  if (!m) return 0;
  const [_, y, mo, d, h, mi, s, sign, tzH, tzM] = m;
  const localEpoch = Date.UTC(+y, +mo-1, +d, +h, +mi, +s) / 1000;
  if (sign) {
    const offsetSec = (+tzH * 3600 + +tzM * 60) * (sign === '-' ? -1 : 1);
    return localEpoch - offsetSec;
  }
  return localEpoch;
}

function getEPG(channelId) {
  if (!channelId || !epgMap[channelId]) return { now: null, next: null };
  const list = epgMap[channelId];
  const nowMs = Date.now() / 1000;
  const now = list.find(e => e.start_timestamp <= nowMs && e.stop_timestamp > nowMs);
  const next = now ? list.find(e => e !== now && e.start_timestamp > nowMs) : list[0];
  return { now, next };
}

function renderEPGGrid() {
  const live = (streams.live||[]).filter(s => !isHiddenContent(s));
  const cats = [...new Set(live.map(s => s.category_id))];
  const body = $('epgGridBody');
  if (!body) return;
  let filterHtml = '<button class="active" data-cat="" onclick="document.querySelectorAll(\'#epgCatFilter button\').forEach(b=>b.classList.remove(\'active\'));this.classList.add(\'active\');renderEPGGrid()">Todas</button>';
  (cats.live||[]).forEach(c => filterHtml += `<button data-cat="${c.category_id}" onclick="document.querySelectorAll('#epgCatFilter button').forEach(b=>b.classList.remove('active'));this.classList.add('active');renderEPGGrid()">${c.category_name}</button>`);
  const f = $('epgCatFilter');
  if (f) f.innerHTML = filterHtml;
  const activeCat = f?.querySelector('.active')?.dataset.cat || '';
  const channels = activeCat ? live.filter(s => s.category_id == activeCat) : live;
  const nowMs = Date.now() / 1000;
  const startTime = nowMs - 6 * 3600;
  const endTime = nowMs + 12 * 3600;
  const range = endTime - startTime;
  const pxPerSec = 100 / 3600;
  const totalPx = range * pxPerSec;
  let html = `<div class="epg-channel-col">${channels.map(s => `<div class="label">${escapeHtml(s.name)}</div>`).join('')}</div><div class="epg-timeline-wrap" id="epgTimeline"><div class="epg-timeline-header">`;
  for (let h = Math.floor(startTime / 3600) * 3600; h < endTime; h += 3600) {
    const dt = new Date(h * 1000);
    const label = dt.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    html += `<div class="epg-hour">${label}</div>`;
  }
  html += '</div>';
  channels.forEach(s => {
    const cid = s.epg_channel_id || s.stream_id;
    const list = epgMap[cid] || [];
    html += `<div class="epg-row">`;
    if (list.length) {
      list.filter(p => p.stop_timestamp > startTime && p.start_timestamp < endTime).forEach(p => {
        const left = Math.max(0, (p.start_timestamp - startTime) * pxPerSec);
        const width = Math.min(totalPx, (p.stop_timestamp - p.start_timestamp) * pxPerSec) - 1;
        if (width < 10) return;
        const pStart = new Date(p.start_timestamp * 1000).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        html += `<div class="epg-program" style="left:${left}px;width:${width}px;${p.start_timestamp <= nowMs && p.stop_timestamp > nowMs ? 'background:rgba(233,69,96,.25);border-left-color:#f1c40f' : ''}" onclick="event.stopPropagation()" title="${escapeHtml(p.title)}"><div class="epg-title">${escapeHtml(p.title)}</div><div class="epg-time">${pStart}</div></div>`;
      });
    }
    html += '</div>';
  });
  body.innerHTML = html;
  const tl = $('epgTimeline');
  if (tl) {
    const nowOffset = (nowMs - startTime) * pxPerSec;
    tl.innerHTML += `<div class="epg-now-line" style="left:${nowOffset}px"></div>`;
    tl.scrollLeft = Math.max(0, nowOffset - tl.clientWidth / 2);
  }
}

function render() {
  const q = $('searchInput').value.toLowerCase();

  if (showingFavs) {
    const favs = getFavs();

      if (f.t === 'series') {
        const s = series.find(x => x.series_id == f.id);
        if (s) items.push({ ...s, _type: 'series', _id: s.series_id });

        if (s) items.push({ ...s, _type: f.t, _id: s.stream_id });

    renderStreams(items);
    focusFirstCardInContent(); return;

  const isSeries = type === 'series';
  let items = isSeries ? series : (streams[type]||[]);

  if (view === 'row' && !catId && !q) { renderRows(isSeries, items); focusFirstCardInContent(); return; }

  const prevView = view;
  if (view === 'row' && q) view = 'grid';
  if (catId) items = items.filter(s => s.category_id == catId);
  if (q) { const qn = normalizeStr(q); items = items.filter(s => { const n = normalizeStr(s.name||''); const c = normalizeStr(s.category_name||''); return n.includes(qn) || c.includes(qn); }); }
  if (!items.length) { $('inner').innerHTML = '<div class="loading">📭 Nenhum conteúdo encontrado</div>'; view = prevView; return; }

  if (isSeries) renderSeries(items);
  else renderStreams(items);
  view = prevView;
  focusFirstCardInContent();
}

function renderRows(isSeries, items) {

    renderStreams(items); focusFirstCardInContent(); return;

function imgUrl(s, field) {
  const val = s[field || 'stream_icon'] || s.cover || '';
  if (!val) return '';
  if (val.startsWith('http://') || val.startsWith('https://')) return val;
  return `${srv.replace(/\/+$/, '')}/pictures/${val}`;
}

async function showSeries(id, name) {
  if (!CACHE[id]) { const keys = Object.keys(CACHE); if (keys.length >= 50) delete CACHE[keys[0]]; CACHE[id] = await api('', `action=get_series_info&series_id=${id}`); }
  const d = CACHE[id];
  const bd = document.createElement('div');
  bd.className = 'modal-backdrop';
  bd.onclick = e => { if (e.target === bd) bd.remove(); };
  const base = srv.replace(/\/+$/, '');
  const sid = d.info?.series_id || '';
  const cover = imgUrl(d.info || {}, 'cover');
  let html = `<div class="modal-box"><button class="close-modal" onclick="this.closest('.modal-backdrop').remove()">✕</button>`;
  html += `<div class="modal-row mb-16">
    ${cover ? `<img src="${cover}" class="modal-cover-sm" onerror="this.onerror=null;this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 150%27%3E%3Crect fill=%27%23222228%27 width=%27100%27 height=%27150%27/%3E%3Ctext x=%2750%27 y=%2790%27 text-anchor=%27middle%27 fill=%27%23555%27 font-size=%2736%27%3E▶%3C/text%3E%3C/svg%3E'">` : ''}
    <div class="flex-1"><h2>${name}</h2>${d.info?.plot ? `<div class="desc mt-8">${d.info.plot}</div>` : ''}</div>
  </div>`;

  const eps = d.episodes || [];
  if (Array.isArray(eps) && eps.length) {
    const seasons = {};
    eps.forEach(ep => {
      const sn = ep.season || 1;
      if (!seasons[sn]) seasons[sn] = [];
      seasons[sn].push(ep);
    });
    Object.keys(seasons).sort((a,b) => a-b).forEach(sn => {
      html += `<div class="season-title">Temporada ${sn}</div>`;
      seasons[sn].forEach(ep => {
        const url = `${base}/series/${user}/${pass}/${sid}/${ep.id}.${ep.container_extension||'mp4'}`;
        html += `<div class="episode-item" tabindex="0" onclick="this.closest('.modal-backdrop').remove();if(splitMode){openInlinePlayer('${(name+' - '+(ep.title||'')).replace(/'/g,"\\'")}',['${url}'])}else{openPlayer('${(name+' - '+(ep.title||'')).replace(/'/g,"\\'")}',['${url}'],0)}">
          <span class="num">${ep.episode_num||''}</span><h4>${ep.title||'Episódio '+(ep.episode_num||'')}</h4>
          <span class="info">${ep.info?.duration?Math.floor(ep.info.duration/60)+'min':''}</span>
        </div>`;
      });
    });
  } else if (typeof eps === 'object' && !Array.isArray(eps)) {
    Object.keys(eps).sort((a,b) => a-b).forEach(sn => {
      if (!eps[sn]?.length) return;
      html += `<div class="season-title">Temporada ${sn}</div>`;
      eps[sn].forEach(ep => {
        const url = `${base}/series/${user}/${pass}/${sid}/${ep.id}.${ep.container_extension||'mp4'}`;
        html += `<div class="episode-item" tabindex="0" onclick="this.closest('.modal-backdrop').remove();if(splitMode){openInlinePlayer('${(name+' - '+(ep.title||'')).replace(/'/g,"\\'")}',['${url}'])}else{openPlayer('${(name+' - '+(ep.title||'')).replace(/'/g,"\\'")}',['${url}'],0)}">
          <span class="num">${ep.episode_num||''}</span><h4>${ep.title||'Episódio '+(ep.episode_num||'')}</h4>
          <span class="info">${ep.info?.duration?Math.floor(ep.info.duration/60)+'min':''}</span>
        </div>`;
      });
    });
  } else {
    html += '<div class="text-muted p-20 text-center">Nenhum episódio disponível</div>';
  }

  bd.innerHTML = html + '</div>';
  document.body.appendChild(bd);
  const fc2 = bd.querySelector('.close-modal, .episode-item');
  if (fc2) setTimeout(() => fc2.focus(), 100);
}

let splitMode = localStorage.getItem('zyx_split') === '1';
let inlineHls = null;
let inlineStreamUrls = null;

function toggleSplit() {
  splitMode = !splitMode;
  localStorage.setItem('zyx_split', splitMode ? '1' : '0');
  $('vSplit').classList.toggle('active', splitMode);
  if (!splitMode) closeInlinePlayer();
}

function playInline(id) {
  const s = (streams[type]||[]).find(x => x.stream_id == id);
  if (!s) return;
  currentStreamInfo = s;
  if (isAdultContent(s) && !sessionStorage.getItem('pin_ok')) { showPinPrompt(() => playChannel(id)); return; }
  if (s.stream_url) { openInlinePlayer(s.name, [s.stream_url]); return; }
  const base = srv.replace(/\/+$/, '');
  const t = type === 'live' ? 'live' : 'movie';
  const ext = s.container_extension || '';
  const urls = [...new Set([
    ext ? `${base}/${t}/${user}/${pass}/${id}.${ext}` : null,
    `${base}/${t}/${user}/${pass}/${id}`,
    `${base}/${t}/${user}/${pass}/${id}.m3u8`,
    `${base}/${t}/${user}/${pass}/${id}.ts`,
  ].filter(Boolean))];
  openInlinePlayer(s.name, urls);
}

function openInlinePlayer(title, urls) {
  inlineStreamUrls = urls;
  $('ipTitle').textContent = title;
  $('inlinePlayer').classList.remove('hidden');
  const wrap = $('inlinePlayer').querySelector('.ip-video-wrap');
  wrap.innerHTML = '<video id="ipVideo" controls playsinline webkit-playsinline></video>';
  const v = $('ipVideo');
  if (inlineHls) { inlineHls.destroy(); inlineHls = null; }

  // Show EPG in inline player
  if (currentStreamInfo) {
    const cid = currentStreamInfo.epg_channel_id || currentStreamInfo.stream_id;
    const {now, next} = getEPG(cid);
    $('ipNow').textContent = now ? `▶ ${now.title}` : '';
    $('ipNext').textContent = next ? `A seguir: ${next.title}` : '';
  }

  function tryUrl(idx) {
    if (idx >= urls.length) return;
    const u = urls[idx];
    const next = () => tryUrl(idx+1);
    if (!useNativePlayer() && typeof Hls !== 'undefined' && Hls.isSupported() && (u.includes('.m3u8') || u.includes('.ts'))) {
      if (inlineHls) inlineHls.destroy();
      inlineHls = new Hls();
      inlineHls.loadSource(u);
      inlineHls.attachMedia(v);
      inlineHls.on(Hls.Events.MANIFEST_PARSED, () => v.play().catch(() => {
        if (inlineHls) { inlineHls.destroy(); inlineHls = null; }
        v.src = u; v.onerror = next; v.play().catch(next);
      }));
      inlineHls.on(Hls.Events.ERROR, (_, d) => {
        if (d.fatal) {
          inlineHls.destroy(); inlineHls = null;
          v.src = u; v.onerror = next; v.play().catch(next);
        }
      });
    } else {
      v.src = u;
      v.onerror = next;
      v.play().catch(next);
    }
  }
  tryUrl(0);
}

function maximizeInlinePlayer() {
  const v = $('ipVideo');
  if (!v) return;
  if (v.requestFullscreen) v.requestFullscreen();
  else if (v.webkitRequestFullscreen) v.webkitRequestFullscreen();
  else { const u = inlineStreamUrls; if (u?.length) { closeInlinePlayer(); openPlayer($('ipTitle')?.textContent||'', u, 0); } }
}

function closeInlinePlayer() {
  if (inlineHls) { inlineHls.destroy(); inlineHls = null; }
  inlineStreamUrls = null;
  $('inlinePlayer').classList.add('hidden');
  const wrap = $('inlinePlayer').querySelector('.ip-video-wrap');
  wrap.innerHTML = '<video id="ipVideo" controls playsinline webkit-playsinline></video>';
}

// ── Play channel ──
function playChannel(id) {
  if (splitMode) { playInline(id); return; }
  const s = (streams[type]||[]).find(x => x.stream_id == id);
  if (!s) return;
  currentStreamInfo = s;
  if (isAdultContent(s) && !sessionStorage.getItem('pin_ok')) { showPinPrompt(() => playChannel(id)); return; }
  if (s.stream_url) { openPlayer(s.name, [s.stream_url], 0); return; }
  const base = srv.replace(/\/+$/, '');
  const t = type === 'live' ? 'live' : 'movie';
  const ext = s.container_extension || '';
  const urls = [...new Set([
    ext ? `${base}/${t}/${user}/${pass}/${id}.${ext}` : null,
    `${base}/${t}/${user}/${pass}/${id}`,
    `${base}/${t}/${user}/${pass}/${id}.m3u8`,
    `${base}/${t}/${user}/${pass}/${id}.ts`,
    `${base}/${t}/${user}/${pass}/${id}.mp4`,
  ].filter(Boolean))];
  openPlayer(s.name, urls, 0);
}

// ── Player ──
let closingPlayer = false;
let currentStreamInfo = null;
let epgTimer = null;

function showPlayerError(msg) {
  const el = $('playerError') || (() => {
    const d = document.createElement('div');
    d.id = 'playerError';
    d.style.cssText = 'position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(233,69,96,.9);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:5;text-align:center;max-width:80%;line-height:1.4';
    $('playerVideoWrap')?.appendChild(d);
    return d;
  })();
  el.textContent = msg;
}

function openPlayer(title, urls, idx) {
  if (idx >= urls.length || closingPlayer) {
    if (idx >= urls.length && !closingPlayer) showPlayerError('Falha ao reproduzir. Verifique a conexão.');
    return;
  }
  showPlayerError('');
  $('playerTitle').textContent = title;
  $('playerOverlay').classList.remove('hidden');
  requestWakeLock();
  const wrap = $('playerVideoWrap');
  wrap.innerHTML = '<video id="playerVideo" controls playsinline webkit-playsinline></video>';
  const v = $('playerVideo');
  if (hls) { hls.destroy(); hls = null; }

  showEpgOverlay();
  wrap.onclick = toggleEpgOverlay;

  const u = urls[idx];
  const tryNext = () => { if (!closingPlayer) openPlayer(title,urls,idx+1); };
  let canplayTimer;

  function playWhenReady() {
    clearTimeout(canplayTimer);
    v.play().catch(() => { v.muted = true; v.play().catch(() => {}); });
  }

  if (!useNativePlayer() && typeof Hls !== 'undefined' && Hls.isSupported() && (u.includes('.m3u8') || u.includes('.ts'))) {
    hls = new Hls();
    hls.loadSource(u);
    hls.attachMedia(v);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      if (!closingPlayer) playWhenReady();
    });
    hls.on(Hls.Events.ERROR, (_, d) => {
      if (d.fatal && !closingPlayer) {
        hls.destroy(); hls = null;
        v.src = u; v.onerror = tryNext;
        v.addEventListener('canplay', playWhenReady, { once: true });
        canplayTimer = setTimeout(tryNext, 20000);
      }
    });
  } else {
    v.src = u;
    v.onerror = tryNext;
    v.addEventListener('canplay', playWhenReady, { once: true });
    canplayTimer = setTimeout(tryNext, 20000);
  }
}

function showEpgOverlay() {
  const epg = $('playerEpg');
  if (!epg) return;
  if (currentStreamInfo) {
    const cid = currentStreamInfo.epg_channel_id || currentStreamInfo.stream_id;
    const {now, next} = getEPG(cid);
    $('pepgName').textContent = currentStreamInfo.name;
    $('pepgNow').textContent = now ? `▶ ${now.title}` : 'Sem programação no momento';
    $('pepgNext').textContent = next ? next.title : '';
  } else {
    const cid = $('playerTitle').textContent;
    $('pepgName').textContent = cid;
    $('pepgNow').textContent = '';
    $('pepgNext').textContent = '';
  }
  epg.classList.add('show');
  clearTimeout(epgTimer);
  epgTimer = setTimeout(() => epg.classList.remove('show'), 15000);
}

function toggleEpgOverlay() {
  const epg = $('playerEpg');
  if (!epg) return;
  if (epg.classList.contains('show')) {
    epg.classList.remove('show');
    clearTimeout(epgTimer);
  } else {
    showEpgOverlay();
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && !$('playerOverlay').classList.contains('hidden')) {
    e.preventDefault();
    closePlayer();
    return;
  }
  if (!$('playerOverlay').classList.contains('hidden')) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowLeft' || e.key === 'ArrowDown' || e.key === 'ArrowUp') {
    e.preventDefault();
    const cards = document.querySelectorAll('.channel-card, .row-card');
    if (!cards.length) return;
    const focused = document.activeElement;
    let cur = Array.from(cards).indexOf(focused);
    if (cur < 0) cur = 0;
    const cols = Math.floor(document.querySelector('.channel-grid')?.offsetWidth / 170) || 4;
    if (e.key === 'ArrowRight' && cur < cards.length - 1) cur++;
    else if (e.key === 'ArrowLeft' && cur > 0) cur--;
    else if (e.key === 'ArrowDown') cur = Math.min(cur + cols, cards.length - 1);
    else if (e.key === 'ArrowUp') cur = Math.max(cur - cols, 0);
    cards[cur].focus();
    cards[cur].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
});

function toggleAdultCat(id, name, checked) {
  let list = getAdultCats();
  if (checked) {
    if (!list.some(a => a.id == id)) list.push({ id, name });
    let hidden = getHiddenCats();
    hidden = hidden.filter(a => a.id != id);
    setHiddenCats(hidden);
  } else {
    list = list.filter(a => a.id != id);
  }
  setAdultCats(list);
}
function toggleHiddenCat(id, name, checked) {
  let list = getHiddenCats();
  if (checked) {
    if (!list.some(a => a.id == id)) list.push({ id, name });
    let adult = getAdultCats();
    adult = adult.filter(a => a.id != id);
    setAdultCats(adult);
  } else {
    list = list.filter(a => a.id != id);
  }
  setHiddenCats(list);
}
async function testConnection() {
  const el = $('netResult');
  if (!el) return;
  el.innerHTML = '<span class="text-muted">Testando...</span>';
  const start = Date.now();
  for (let i = 0; i < PROXIES.length; i++) {
    const url = $('xtreamCorsProxy')?.checked ? PROXIES[i](srv) : srv;
    try {
      await fetch(url, { mode: 'no-cors', signal: AbortSignal.timeout(10000) });
      el.innerHTML = `<span style="color:#4ecdc4">✅ Servidor respondeu em ${Date.now()-start}ms</span>`;
      return;
    } catch(e) {
      if (i === PROXIES.length - 1)
        el.innerHTML = `<span style="color:#ff4757">❌ Sem resposta (${e.name})</span>`;
    }
  }
}

document.addEventListener('keydown', e => {
  const isTvMode = document.body.classList.contains('tv-mode');
  const isLogin = $('loginScreen') && !$('loginScreen').classList.contains('hidden');
  const isPlayer = $('playerOverlay') && !$('playerOverlay').classList.contains('hidden');

  // Back (Android: 4, WebOS: 8/10009, Browser: 27)
  if (e.keyCode === 4 || e.keyCode === 8 || e.keyCode === 10009) {
    const tag = document.activeElement?.tagName;
    const isInput = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';
    if (e.keyCode === 8 && isInput) return;
    if ((e.keyCode === 4 || e.keyCode === 10009) && isInput) {
      document.activeElement.value = ''; document.activeElement.dispatchEvent(new Event('input')); return;
    }
    e.preventDefault();
    const epgGrid = document.querySelector('.epg-grid-overlay');
    if (epgGrid) { epgGrid.remove(); return; }
    if (isPlayer) { closePlayer(); return; }
    const modals = ['settingsModal','adminModal','seriesModal','epgModal','pinModal','channelInfo'];
    for (const id of modals) {
      const el = document.getElementById(id);
      if (el && !el.classList.contains('hidden')) {
        if (id === 'settingsModal' && typeof closeSettings === 'function') { closeSettings(); return; }
        if (id === 'adminModal' && typeof closeAdmin === 'function') { closeAdmin(); return; }
        if (id === 'seriesModal' && typeof closeSeries === 'function') { closeSeries(); return; }
        if (id === 'epgModal' && typeof closeEPG === 'function') { closeEPG(); return; }
        if (id === 'pinModal' && typeof closePin === 'function') { closePin(); return; }
        if (id === 'channelInfo' && typeof closeChannelInfo === 'function') { closeChannelInfo(); return; }
        el.classList.add('hidden'); return;
      }
    }
    const modalBackdrop = document.querySelector('.modal-backdrop');
    if (modalBackdrop) { modalBackdrop.remove(); return; }
    if (isLogin && typeof logout === 'function') logout();
    return;
  }

  // Escape closes modal, EPG grid or player
  if (e.key === 'Escape') {
    const epg = document.querySelector('.epg-grid-overlay');
    if (epg) { epg.remove(); return; }
    const backdrop = document.querySelector('.modal-backdrop');
    if (backdrop) { backdrop.remove(); return; }
    if (isPlayer) { e.preventDefault(); closePlayer(); return; }
  }
  if (isPlayer) return;

  // Enter / Space triggers click on focused element
  if (e.key === 'Enter' || e.key === ' ') {
    const el = document.activeElement;
    if (el && el.matches('.channel-card, .channel-row, .row-card, .module-header, .cat-item, .fav-header, .view-btn, .fav-btn, .icon-btn, .login-btn, .login-save-btn, .btn-secondary, .close-modal, .play-btn, .episode-item, .ip-btn')) {
      e.preventDefault();
      el.click();
      return;
    }
    if (isLogin) {
      const tag = el?.tagName;
      if (tag === 'INPUT' || tag === 'SELECT') {
        const btn = $('connectBtn');
        if (btn && !btn.disabled) { btn.click(); return; }
      }
    }
  }

  // Arrow key navigation
  if (e.key.startsWith('Arrow')) {
    // Login screen: tab between elements
    if (isLogin) {
      e.preventDefault();
      const focusable = document.querySelectorAll('#loginScreen input, #loginScreen select, #loginScreen button:not(.btn-admin-login), #loginScreen label');
      const cur = Array.from(focusable).indexOf(document.activeElement);
      let next = cur;
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') next = Math.min(cur + 1, focusable.length - 1);
      else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') next = Math.max(cur - 1, 0);
      if (next !== cur) focusable[next]?.focus();
      return;
    }
    const tag = document.activeElement?.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
    // Modal navigation
    const modal = document.querySelector('.modal-backdrop');
    if (modal) {
      e.preventDefault();
      const items = modal.querySelectorAll('.close-modal, .play-btn, .episode-item, button, input, select, textarea, [tabindex]:not([tabindex="-1"])');
      const cur = Array.from(items).indexOf(document.activeElement);
      let next = cur;
      if (e.key === 'ArrowDown' || e.key === 'ArrowRight') next = Math.min(cur + 1, items.length - 1);
      else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') next = Math.max(cur - 1, 0);
      if (next >= 0 && next !== cur) items[next].focus();
      return;
    }
    // Main panel navigation
    const po = $('playerOverlay');
    if (po && !po.classList.contains('hidden')) return;
    e.preventDefault();
    const active = document.activeElement;
    const sidebarEls = document.querySelectorAll('.module-header, .cat-item, .fav-header');
    const cards = document.querySelectorAll('.channel-card, .row-card, .channel-row');
    const viewBtns = document.querySelectorAll('.view-btn');
    const sidebar = $('sidebar');

    // Sidebar navigation (↑↓ move, → goes to content)
    if (active && sidebar?.contains(active)) {
      let arr = Array.from(sidebarEls).filter(el => !el.closest('.module-body:not(.open)'));
      if (!arr.includes(active)) {
        const all = Array.from(sidebarEls);
        const ci = all.indexOf(active);
        if (ci >= 0) { // active is hidden, find nearest visible
          const before = all.slice(0, ci).reverse().find(el => !el.closest('.module-body:not(.open)'));
          const after = all.slice(ci+1).find(el => !el.closest('.module-body:not(.open)'));
          const target = (e.key === 'ArrowUp' ? before : after) || before || after;
          if (target) { target.focus(); target.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
          return;
        }
      }
      const cur = arr.indexOf(active);
      let next = cur;
      if (e.key === 'ArrowDown') next = Math.min(cur + 1, arr.length - 1);
      else if (e.key === 'ArrowUp') next = Math.max(cur - 1, 0);
      else if (e.key === 'ArrowRight') {
        if (cards.length) { cards[0].focus(); return; }
        if (ipEls.length) { ipEls[0].focus(); return; }
        if (viewBtns.length) { viewBtns[0].focus(); return; }
      }
      if (next >= 0 && next !== cur) { arr[next].focus(); arr[next].scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
      return;
    }

    // Inline player navigation
    const ip = $('inlinePlayer');
    const ipVisible = ip && !ip.classList.contains('hidden');
    const ipEls = ipVisible ? Array.from(ip.querySelectorAll('.ip-btn, #ipVideo')) : [];
    const focusedIp = active && ipEls.includes(active);

    // Content area navigation (↑↓ move, ← goes to sidebar)
    if (cards.length || ipEls.length) {
      const focusedCard = active && (active.matches('.channel-card, .channel-row, .row-card'));
      if (focusedIp) {
        if (e.key === 'ArrowLeft' && sidebarEls.length) { sidebarEls[0]?.focus(); return; }
        if (e.key === 'ArrowRight') return;
        const cur = ipEls.indexOf(active);
        let next = cur;
        if (e.key === 'ArrowDown' || e.key === 'ArrowRight') next = Math.min(cur + 1, ipEls.length - 1);
        else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') next = Math.max(cur - 1, 0);
        if (next !== cur) { ipEls[next].focus(); return; }
        if (e.key === 'ArrowUp' && cards.length) { cards[cards.length-1].focus(); return; }
        return;
      }
      if (e.key === 'ArrowLeft' && sidebarEls.length) { sidebarEls[0]?.focus(); return; }
      if (e.key === 'ArrowRight') { if (ipEls.length) { ipEls[0].focus(); } return; }
      if (focusedCard || !active || active === document.body) {
        const arr = Array.from(cards);
        const curIdx = arr.indexOf(active);
        let idx = curIdx < 0 ? 0 : curIdx;
        if (e.key === 'ArrowDown' && idx >= arr.length - 1 && ipEls.length) { ipEls[0].focus(); return; }
        if (e.key === 'ArrowUp' && curIdx < 0 && viewBtns.length) { viewBtns[0]?.focus(); return; }
        const isGrid = active?.closest('.channel-grid');
        const step = isGrid ? (Math.floor(document.querySelector('.channel-grid')?.offsetWidth / 170) || 4) : 1;
        if (e.key === 'ArrowDown') idx = Math.min(idx + step, arr.length - 1);
        else if (e.key === 'ArrowUp') idx = Math.max(idx - step, 0);
        if (idx !== curIdx) { arr[idx].focus(); arr[idx].scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
        return;
      }
    }

    // View buttons navigation (no panel change needed)
    if (active && viewBtns.length && Array.from(viewBtns).includes(active)) {
      const arr = Array.from(viewBtns);
      const cur = arr.indexOf(active);
      let next = cur;
      if (e.key === 'ArrowLeft' && cur > 0) next = cur - 1;
      else if (e.key === 'ArrowRight' && cur < arr.length - 1) next = cur + 1;
      else if (e.key === 'ArrowDown' && cards.length) { cards[0].focus(); return; }
      else if (e.key === 'ArrowUp' && sidebarEls.length) { sidebarEls[0]?.focus(); return; }
      if (next !== cur) arr[next].focus();
    }
  }
});

// ── Auto-connect on load ──
function tryAutoConnect() {
  const saved = getServers();
  // Find favorite server first, then last used
  const fav = saved.find(s => s.fav && (s.type === 'm3u' || (s.user && s.pass)));
  const last = saved.find(s => s.url === localStorage.getItem('zyx_last') && (s.type === 'm3u' || (s.user && s.pass)));
  const target = fav || last;
  if (target) {
    const idx = saved.indexOf(target);
    quickConnect(idx);
  }
}
setTimeout(tryAutoConnect, 150);
